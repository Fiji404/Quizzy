                    </figure>
                    <figure class="quiz-figure">
                        <h2 class="quiz-figure__quiz-name"><span class="quiz-figure__language-icon quiz-figure__language-icon_js"><i class="fa-brands fa-js"></i></span>  JavaScript quiz</h2>
                        <p class="quiz-figure__about-quiz">Question about variables, scoping, function, hoisting, clearly way to write code and other interesting stuff</p>
                    </figure>
                    <figure class="quiz-figure">
                        <h2 class="quiz-figure__quiz-name"><span class="quiz-figure__language-icon quiz-figure__language-icon_sass"><i class="fa-brands fa-sass"></i></span> Sass quiz</h2>
                        <p class="quiz-figure__about-quiz">All about Sass preprocessor, including loops, functions, variables, nesting feature, ways of importing files and other </p>
                    </figure>
                </section>
