<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../sass/styles.scss">
    <script type="module" defer src="../scripts/app.js">module;</script>
    <title>Quiz App</title>
</head>
<body>
    <nav class="nav">
        <header>
            <h1 class="nav__page-title">Quizzes</h1>
        </header>
        <button class="nav__change-quiz-btn">Choose Quiz</button>
    </nav>
    <main class="main-content">
        <h2 class="quiz-name"><span class="html-language">HTML</span> language knowledge</h2>
        <section class="quiz-interface">
            <header>
                <h2 class="quiz-interface__question">How many <code>h1</code> elements you can use on website</h2>
            </header>
            <ul class="answers-list">
                <li class="answers-list__item">
                    <input class="answers-list__input" id="first-answer" name="quiz-answer" type="radio">
                    <label class="answers-list__label" for="first-answer">Two elements</label>
                </li>
                <li class="answers-list__item">
                    <input class="answers-list__input" id="second-answer" name="quiz-answer" type="radio">
                    <label class="answers-list__label" for="second-answer">Three elements</label>
                </li>
                <li class="answers-list__item">
                    <input class="answers-list__input" id="third-answer" name="quiz-answer" type="radio">
                    <label class="answers-list__label" for="third-answer">One element</label>
                </li>
                <li class="answers-list__item">
                    <input class="answers-list__input" id="fourth-answer" name="quiz-answer" type="radio">
                    <label class="answers-list__label" for="fourth-answer">There is no limit</label>
                </li>
            </ul>
        </section>
        <aside class="quizes-list-section">
            <h2 class="quizes-type-title">Programming quizes</h2>
            <ul class="quizes-list">
                <li class="quizes-list__item">
                    <a class="quizes-list__link" href="#"><span class="html-language">HTML</span> Quiz</a>
                </li>
                <li class="quizes-list__item">
                    <a class="quizes-list__link" href="#"><span class="css-language">CSS</span> Quiz</a>
                </li>
                <li class="quizes-list__item">
                    <a class="quizes-list__link" href="#"><span class="javascript-language">JavaScript</span> Quiz</a>
                </li>
                <li class="quizes-list__item">
                    <a class="quizes-list__link" href="#"><span class="sass-language">SASS</span> Quiz</a>
                </li>
            </ul>
        </aside>
    </main>
</body>
</html>
