<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="../sass/styles.scss" />
        <script type="module" defer src="../scripts/app.js">
            module;
        </script>
        <script src="https://kit.fontawesome.com/753d009a2f.js" crossorigin="anonymous"></script>
        <title>Quizzy</title>
    </head>
    <body>
        <button aria-label="back from quizzes button" class="nav__back-from-quizes">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <nav class="nav">
            <header>
                <h1 class="nav__page-title">Quizzy</h1>
            </header>
            <button class="nav__change-quiz-btn">Choose Quiz</button>
        </nav>
        <main class="main-content">
            <section class="overview-intro">
                <header>
                    <h2 class="overview-intro__title">
                        Welcome in the <span class="app-name">Quizzy</span>, app created to improve knowledge of any
                        topic
                    </h2>
                    <p class="overview-intro__desc">Available quizzes you can see below:</p>
                </header>
                <section class="available-quizzes-grid">
                    <figure style="--delay: 100ms" class="quiz-figure quiz-figure_html">
                        <h2 class="quiz-figure__quiz-name">
                            <span class="quiz-figure__quiz-icon quiz-figure__quiz-icon_html"
                                ><i class="fa-brands fa-html5"></i
                            ></span>
                            HTML Quiz
                        </h2>
                        <p class="quiz-figure__about-quiz">
                            That quiz test your all knowledge about HTML language like building structure, how screen
                            readers recognizes content, available atributes and more !
                        </p>
                        <figcaption class="quiz-figure__quiz-type quiz-figure__quiz-type_programming">
                            <i class="fa-solid fa-code"></i> Programming Topic
                        </figcaption>
                    </figure>
                    <figure style="--delay: 200ms" class="quiz-figure">
                        <h2 class="quiz-figure__quiz-name">
                            <span class="quiz-figure__quiz-icon quiz-figure__quiz-icon_css"
                                ><i class="fa-brands fa-css3"></i></span
                            >CSS Quiz
                        </h2>
                        <p class="quiz-figure__about-quiz">
                            Test your skills in selector types, cascade, specificity, how correctly apply styles,
                            behavior of diffrent properties and more !
                        </p>
                        <figcaption class="quiz-figure__quiz-type quiz-figure__quiz-type_programming">
                            <i class="fa-solid fa-code"></i> Programming Topic
                        </figcaption>
                    </figure>
                    <figure style="--delay: 300ms" class="quiz-figure">
                        <h2 class="quiz-figure__quiz-name">
                            <span class="quiz-figure__quiz-icon quiz-figure__quiz-icon_js"
                                ><i class="fa-brands fa-js"></i></span
                            >JavaScript Quiz
                        </h2>
                        <p class="quiz-figure__about-quiz">
                            Questions about variables, scoping, function, hoisting, clearly way to write code and also
                            newly added features to language.
                        </p>
                        <figcaption class="quiz-figure__quiz-type quiz-figure__quiz-type_programming">
                            <i class="fa-solid fa-code"></i> Programming Topic
                        </figcaption>
                    </figure>
                    <figure style="--delay: 400ms" class="quiz-figure">
                        <h2 class="quiz-figure__quiz-name">
                            <span class="quiz-figure__quiz-icon quiz-figure__quiz-icon_sass"
                                ><i class="fa-brands fa-sass"></i
                            ></span>
                            Sass Quiz
                        </h2>
                        <p class="quiz-figure__about-quiz">
                            All about Sass preprocessor, including loops, functions, variables, nesting feature, ways of
                            importing files and other interesting things.
                        </p>
                        <figcaption class="quiz-figure__quiz-type quiz-figure__quiz-type_programming">
                            <i class="fa-solid fa-code"></i> Programming Topic
                        </figcaption>
                    </figure>
                    <figure style="--delay: 600ms" class="quiz-figure">
                        <h2 class="quiz-figure__quiz-name">
                            <span class="quiz-figure__quiz-icon quiz-figure__quiz-icon_population"
                                ><i class="fa-solid fa-user-group"></i
                            ></span>
                            Population Quiz
                        </h2>
                        <p class="quiz-figure__about-quiz">
                            That quiz takes your knowledge about the population exisiting in the world. Questions might
                            be: How much people live in Poland country etc.
                        </p>
                        <figcaption class="quiz-figure__quiz-type quiz-figure__quiz-type_world">
                            <i class="fa-solid fa-earth-americas"></i> World knowledge
                        </figcaption>
                    </figure>
                    <figure style="--delay: 500ms" class="quiz-figure">
                        <h2 class="quiz-figure__quiz-name">
                            <span class="quiz-figure__quiz-icon quiz-figure__quiz-icon_flag"
                                ><i class="fa-solid fa-flag"></i></span>
                            Flags Quiz
                        </h2>
                        <p class="quiz-figure__about-quiz">
                            In this quiz you will try to solve the names of countries by their flag ! You will answer almost 3000 thousand possible flags in the world
                        </p>
                        <figcaption class="quiz-figure__quiz-type quiz-figure__quiz-type_world">
                            <i class="fa-solid fa-earth-americas"></i> World knowledge
                        </figcaption>
                    </figure>
                </section>
            </section>

        </main>
    </body>
</html>
